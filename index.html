<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Photo + Music</title>
<style>
  body, html { margin:0; padding:0; font-family: sans-serif; background:black; color:white; }
  #btnStart {
    position: absolute; top:50%; left:50%;
    transform: translate(-50%, -50%);
    padding: 18px 36px; font-size:20px;
    cursor:pointer; background:#444; border:none; border-radius:8px;
  }
  #content { display:none; }
  iframe { width:100%; height:80vh; border:none; }
</style>
</head>

<body>

<button id="btnStart">再生する</button>

<div id="content">
  <audio id="music" controls>
    <source src="https://あなたのユーザー名.github.io/music-site/music.mp3" type="audio/mpeg">
  </audio>
  <iframe src="https://photos.google.com/share/KoBPMsTjoUKUr1CS9?key=KoBPMsTjoUKUr1CS9" allowfullscreen></iframe>
</div>

<script>
document.getElementById("btnStart").onclick = function(){
  document.getElementById("btnStart").style.display = "none";
  document.getElementById("content").style.display = "block";
  document.getElementById("music").play();
};
</script>

</body>
</html>
